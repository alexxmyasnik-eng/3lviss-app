<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Lviss HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-top: 60px; overflow: hidden; -webkit-user-select: none; }
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #0f0; box-sizing: border-box; z-index: 1000; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #0f0; object-fit: cover; }
        .balance-top { color: #0f0; font-weight: bold; font-size: 16px; }
        
        .tab-content { display: none; text-align: center; height: calc(100vh - 120px); overflow-y: auto; padding: 10px; }
        .active { display: block; }

        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .case-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; }
        .case-price { color: #0f0; font-weight: bold; }

        .roulette-wrapper { position: relative; width: 100%; height: 180px; background: #0a0a0a; border: 1px solid #222; overflow: hidden; margin-top: 10px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: #f00; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; will-change: transform; }
        .item-card { min-width: 130px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; }
        .item-card img { width: 80px; height: 80px; }
        .item-card span { font-size: 10px; color: #555; margin-top: 5px; }

        .main-btn { width: 100%; height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .spin-btn { background: #0f0; color: #000; }
        .choice-group { display: none; gap: 10px; width: 100%; }
        .keep-btn { background: #333; color: #fff; flex: 1; }
        .sell-btn { background: #f00; color: #fff; flex: 1; }

        .inv-item { background: #111; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .inv-btn { padding: 8px 12px; border-radius: 8px; border: none; font-size: 10px; font-weight: bold; margin-left: 5px; }
        
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 11px; font-weight: bold; }
        .nav-item.active-tab { color: #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <img id="user-photo" class="avatar" style="display:none;">
            <span id="user-nick">@User</span>
        </div>
        <div class="balance-top" id="balance-val">0 ★</div>
    </div>

    <div id="shop" class="tab-content active">
        <div class="case-grid">
            <div class="case-card" onclick="openCase(222, 'Lite')"><div>Lite</div><div class="case-price">222 ★</div></div>
            <div class="case-card" onclick="openCase(444, 'Lucky')"><div>Lucky</div><div class="case-price">444 ★</div></div>
            <div class="case-card" onclick="openCase(888, 'Elite')"><div>Elite</div><div class="case-price">888 ★</div></div>
        </div>
    </div>

    <div id="roulette-screen" class="tab-content">
        <div class="roulette-wrapper"><div class="pointer"></div><div id="tape" class="tape"></div></div>
        <div class="controls" style="margin-top:20px;">
            <button id="spinBtn" class="main-btn spin-btn">ОТКРЫТЬ</button>
            <div id="choice-btns" class="choice-group">
                <button class="keep-btn main-btn" onclick="handleChoice('keep')">ОСТАВИТЬ</button>
                <button class="sell-btn main-btn" onclick="handleChoice('sell')">ПРОДАТЬ</button>
            </div>
        </div>
    </div>

    <div id="inventory" class="tab-content">
        <div id="inv-list"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-tab" onclick="openTab('shop')">🎰 КЕЙСЫ</div>
        <div class="nav-item" onclick="openTab('inventory')">🎒 СКЛАД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Данные юзера
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('user-nick').innerText = user.username ? '@'+user.username : user.first_name;
            if(user.photo_url) {
                const img = document.getElementById('user-photo');
                img.src = user.photo_url; img.style.display = 'block';
            }
        }

        let balance = parseInt(new URLSearchParams(window.location.search).get('balance')) || 0;
        document.getElementById('balance-val').innerText = balance + " ★";

        const items = [
            { name: "Ice Cream", img: "1.png" },
            { name: "Gift Box", img: "2.png" },
            { name: "Snoop Cigar", img: "3.png" }
        ];

        let myInv = JSON.parse(localStorage.getItem('myInv')) || [];
        let currentPrice = 0;
        let winItem = null;
        let isSpinning = false;

        function openCase(p) {
            if(isSpinning) return;
            currentPrice = p;
            document.getElementById('spinBtn').innerText = `КРУТИТЬ ЗА ${p} ★`;
            document.getElementById('spinBtn').style.display = 'block';
            document.getElementById('choice-btns').style.display = 'none';
            openTab('roulette-screen');
            fillTape();
        }

        function fillTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            for(let i=0; i<60; i++) {
                const it = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="item-card"><img src="${it.img}"><span>???</span></div>`;
            }
        }

        document.getElementById('spinBtn').onclick = () => {
            if(balance < currentPrice || isSpinning) return;
            isSpinning = True;
            balance -= currentPrice;
            document.getElementById('balance-val').innerText = balance + " ★";
            tg.sendData(JSON.stringify({action: "spin", price: currentPrice}));

            document.getElementById('spinBtn').style.display = 'none';
            const stopIdx = 45;
            winItem = items[Math.floor(Math.random()*items.length)];
            const tape = document.getElementById('tape');
            tape.children[stopIdx].innerHTML = `<img src="${winItem.img}"><span style="color:#0f0">${winItem.name}</span>`;

            tape.style.transition = "transform 6s cubic-bezier(0.1, 0, 0.1, 1)";
            const offset = -(stopIdx * 130) + (window.innerWidth / 2) - 65;
            tape.style.transform = `translateX(${offset}px)`;

            setTimeout(() => {
                document.getElementById('choice-btns').style.display = 'flex';
                isSpinning = false;
            }, 6500);
        };

        function handleChoice(type) {
            document.getElementById('choice-btns').style.display = 'none';
            if(type === 'keep') {
                myInv.push(winItem);
                localStorage.setItem('myInv', JSON.stringify(myInv));
                tg.sendData(JSON.stringify({action: "save", item: winItem.name}));
            } else {
                let sellP = Math.floor(currentPrice * 0.5);
                balance += sellP;
                document.getElementById('balance-val').innerText = balance + " ★";
                tg.sendData(JSON.stringify({action: "sell", price: sellP}));
            }
            openTab('shop');
        }

        function renderInv() {
            const list = document.getElementById('inv-list');
            list.innerHTML = myInv.length ? '' : '<p style="color:#444; margin-top:50px;">Пусто...</p>';
            myInv.forEach((it, idx) => {
                list.innerHTML += `<div class="inv-item">
                    <div style="display:flex; align-items:center; gap:10px;"><img src="${it.img}" width="40"><b>${it.name}</b></div>
                    <div>
                        <button class="inv-btn" style="background:#007bff; color:#fff;" onclick="sendWithdraw(${idx})">ВЫВОД</button>
                    </div>
                </div>`;
            });
        }

        function sendWithdraw(idx) {
            const it = myInv[idx];
            tg.sendData(JSON.stringify({action: "withdraw", item: it.name}));
            tg.showAlert("Заявка на вывод " + it.name + " отправлена!");
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            if(id === 'inventory') renderInv();
        }
    </script>
</body>
</html>

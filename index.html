<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NFT Cases</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #11111a;
    --bg3: #1a1a28;
    --accent: #c084fc;
    --accent2: #818cf8;
    --gold: #f59e0b;
    --gold2: #fcd34d;
    --red: #ef4444;
    --blue: #3b82f6;
    --green: #10b981;
    --gray: #6b7280;
    --text: #f1f5f9;
    --text2: #94a3b8;
    --border: rgba(255,255,255,0.07);
    --card-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    padding-bottom: 80px;
  }

  /* ===== HEADER ===== */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .logo { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .balance-badge {
    display: flex; align-items: center; gap: 6px;
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 14px;
    font-weight: 600; font-size: 15px;
  }
  .balance-badge .coin { width: 18px; height: 18px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #000; flex-shrink: 0; }
  .balance-amount { color: var(--gold2); font-family: 'Rajdhani', sans-serif; font-size: 17px; min-width: 60px; text-align: right; }

  /* ===== NAV ===== */
  .nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg2); border-top: 1px solid var(--border);
    display: flex; justify-content: space-around; padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px 16px;
    background: none; border: none; color: var(--gray); cursor: pointer; transition: color 0.2s; font-family: 'Exo 2', sans-serif; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn span { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; }

  /* ===== PAGES ===== */
  .page { display: none; padding: 16px; }
  .page.active { display: block; }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
    color: var(--text2); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 12px; padding-left: 2px;
  }

  /* ===== CASE CARDS ===== */
  .cases-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .case-card {
    background: var(--bg2); border-radius: 16px; border: 1px solid var(--border);
    overflow: hidden; cursor: pointer; transition: transform 0.15s, border-color 0.2s;
    position: relative;
  }
  .case-card:active { transform: scale(0.97); }
  .case-card.featured { border-color: rgba(192, 132, 252, 0.4); }
  .case-card-img {
    width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .case-emoji { font-size: 64px; filter: drop-shadow(0 0 20px rgba(192,132,252,0.5)); }
  .case-bg {
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, var(--glow-color, rgba(192,132,252,0.15)) 0%, transparent 70%);
  }
  .case-info { padding: 10px 12px 12px; }
  .case-name { font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 0.5px; }
  .case-price { display: flex; align-items: center; gap: 4px; margin-top: 6px; }
  .case-price-val { color: var(--gold2); font-weight: 700; font-size: 15px; font-family: 'Rajdhani', sans-serif; }
  .case-badge {
    position: absolute; top: 8px; right: 8px;
    background: var(--accent); color: #fff;
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; letter-spacing: 0.5px;
  }

  /* ===== OPEN MODAL ===== */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(4px);
    display: flex; flex-direction: column; align-items: center;
    overflow-y: auto; padding: 16px;
  }
  .modal-overlay.hidden { display: none; }
  .modal-box {
    background: var(--bg2); border-radius: 20px; border: 1px solid var(--border);
    width: 100%; max-width: 440px; overflow: hidden;
    margin: auto;
  }
  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; }
  .modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 24px; line-height: 1; }

  /* ===== ROULETTE ===== */
  .roulette-wrap {
    padding: 20px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .roulette-container {
    width: 100%; position: relative; overflow: hidden; border-radius: 12px;
    border: 2px solid rgba(192,132,252,0.3);
    background: var(--bg3);
  }
  .roulette-pointer {
    position: absolute; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 2px; background: var(--gold);
    z-index: 10; pointer-events: none;
  }
  .roulette-pointer::before {
    content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    border-left: 7px solid transparent; border-right: 7px solid transparent;
    border-top: 10px solid var(--gold);
  }
  .roulette-pointer::after {
    content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    border-left: 7px solid transparent; border-right: 7px solid transparent;
    border-bottom: 10px solid var(--gold);
  }
  .roulette-track {
    display: flex; will-change: transform; transition: transform cubic-bezier(0.05, 0.5, 0.3, 1) 5s;
  }
  .roulette-item {
    flex-shrink: 0; width: 100px; height: 100px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 4px; border-right: 1px solid var(--border);
    position: relative;
  }
  .roulette-item-emoji { font-size: 40px; }
  .roulette-item-rarity {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  }
  .ri-common { background: var(--gray); }
  .ri-uncommon { background: var(--blue); }
  .ri-rare { background: var(--accent2); }
  .ri-epic { background: var(--accent); }
  .ri-legendary { background: var(--gold); }

  /* ===== RESULT ===== */
  .result-box {
    text-align: center; padding: 16px;
    display: none;
  }
  .result-box.show { display: block; }
  .result-item-big {
    width: 120px; height: 120px; margin: 0 auto 12px;
    background: var(--bg3); border-radius: 20px;
    display: flex; align-items: center; justify-content: center; font-size: 64px;
    border: 2px solid transparent;
    animation: winPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes winPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  .result-name { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .result-value { font-size: 14px; color: var(--text2); margin-bottom: 16px; }
  .result-sell-btn {
    background: var(--green); color: #fff; border: none; border-radius: 12px;
    padding: 10px 24px; font-family: 'Exo 2', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-right: 8px;
  }
  .result-keep-btn {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 24px; font-family: 'Exo 2', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer;
  }

  /* ===== OPEN BTN ===== */
  .open-case-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 14px; color: #fff;
    font-family: 'Rajdhani', sans-serif; font-size: 19px; font-weight: 700;
    letter-spacing: 1px; cursor: pointer; transition: opacity 0.2s, transform 0.1s;
  }
  .open-case-btn:active { transform: scale(0.98); }
  .open-case-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ===== DROPS TABLE ===== */
  .drops-table { width: 100%; }
  .drops-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-bottom: 1px solid var(--border);
  }
  .drops-emoji { font-size: 28px; flex-shrink: 0; }
  .drops-info { flex: 1; }
  .drops-name { font-size: 14px; font-weight: 600; }
  .drops-rarity { font-size: 12px; color: var(--text2); margin-top: 1px; }
  .drops-chance { font-size: 13px; font-weight: 600; color: var(--text2); }
  .rarity-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }

  /* ===== TOP UP ===== */
  .topup-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  .topup-btn {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
    padding: 14px 8px; text-align: center; cursor: pointer; transition: border-color 0.2s, transform 0.1s;
  }
  .topup-btn:active { transform: scale(0.97); border-color: var(--accent); }
  .topup-amount { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; color: var(--gold2); }
  .topup-price { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* ===== INVENTORY ===== */
  .inv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .inv-item {
    background: var(--bg2); border-radius: 12px; border: 1px solid var(--border);
    padding: 10px 8px; text-align: center; position: relative;
  }
  .inv-emoji { font-size: 36px; }
  .inv-name { font-size: 11px; font-weight: 600; margin-top: 4px; line-height: 1.3; }
  .inv-val { font-size: 12px; color: var(--gold2); font-weight: 700; margin-top: 3px; }
  .inv-sell-mini {
    width: 100%; margin-top: 6px; padding: 5px 0;
    background: rgba(16, 185, 129, 0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3);
    border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer;
    font-family: 'Exo 2', sans-serif;
  }
  .empty-inv { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-inv svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.4; }

  /* ===== PROFILE ===== */
  .profile-header {
    background: var(--bg2); border-radius: 16px; border: 1px solid var(--border);
    padding: 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
  }
  .avatar {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif; font-size: 28px; font-weight: 700;
  }
  .profile-name { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; }
  .profile-id { font-size: 12px; color: var(--text2); margin-top: 3px; }
  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px;
  }
  .stat-card {
    background: var(--bg2); border-radius: 12px; border: 1px solid var(--border);
    padding: 14px 10px; text-align: center;
  }
  .stat-val { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 3px; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 12px;
    padding: 10px 20px; font-size: 14px; font-weight: 600;
    z-index: 999; opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* rarity borders */
  .b-common { border-color: rgba(107,114,128,0.6) !important; }
  .b-uncommon { border-color: rgba(59,130,246,0.6) !important; }
  .b-rare { border-color: rgba(129,140,248,0.6) !important; }
  .b-epic { border-color: rgba(192,132,252,0.6) !important; }
  .b-legendary { border-color: rgba(245,158,11,0.6) !important; }

  .rarity-common { color: var(--gray); }
  .rarity-uncommon { color: var(--blue); }
  .rarity-rare { color: var(--accent2); }
  .rarity-epic { color: var(--accent); }
  .rarity-legendary { color: var(--gold); }
</style>
</head>

    <span style="color:var(--accent)">Версия 1.0</span>
  </div>
</div>

<!-- =================== OPEN MODAL =================== -->
<div class="modal-overlay hidden" id="openModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Открыть кейс</div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="roulette-wrap">
      <div class="roulette-container" id="rouletteContainer">
        <div class="roulette-pointer"></div>
        <div class="roulette-track" id="rouletteTrack"></div>
      </div>
      <div class="result-box" id="resultBox">
        <div class="result-item-big" id="resultEmoji"></div>
        <div class="result-name" id="resultName"></div>
        <div class="result-value" id="resultValue"></div>
        <div>
          <button class="result-sell-btn" id="resultSellBtn">Продать</button>
          <button class="result-keep-btn" id="resultKeepBtn">Сохранить</button>
        </div>
      </div>
      <button class="open-case-btn" id="openCaseBtn">🔓 ОТКРЫТЬ</button>
    </div>
    <div style="padding:0 20px 16px;">
      <div class="section-title">Возможные дропы</div>
      <div class="drops-table" id="dropsTable"></div>
    </div>
  </div>
</div>

<!-- =================== NAV =================== -->
<nav class="nav">
  <button class="nav-btn active" data-page="cases" onclick="setPage('cases',this)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2M8 7V5a2 2 0 0 0-4 0v2"/></svg>

  <button class="nav-btn" data-page="inventory" onclick="setPage('inventory',this)">

    <span>Профиль</span>
  </button>
</nav>

      { id: 'd2', name: 'Коготь', emoji: '🦴', rarity: 'uncommon', value: 450, chance: 27 },
      { id: 'd3', name: 'Огненный Яйцо', emoji: '🥚', rarity: 'rare', value: 900, chance: 20 },
      { id: 'd4', name: 'Голова Дракона', emoji: '🐲', rarity: 'epic', value: 2500, chance: 13 },
      { id: 'd5', name: 'Вечный Дракон', emoji: '🔱', rarity: 'legendary', value: 10000, chance: 7 },
    ]
  },
];

const TOPUP_OPTIONS = [
  { amount: 100, label: '100' },
  { amount: 250, label: '250' },
  { amount: 500, label: '500' },
  { amount: 1000, label: '1 000' },
  { amount: 2500, label: '2 500' },
  { amount: 5000, label: '5 000' },
];

const RARITY_COLORS = {
  common: '#6b7280', uncommon: '#3b82f6', rare: '#818cf8', epic: '#c084fc', legendary: '#f59e0b'
};
const RARITY_NAMES = {
  common: 'Обычный', uncommon: 'Необычный', rare: 'Редкий', epic: 'Эпический', legendary: 'Легендарный'
};

// ============================================================
// STATE — precise integer balance to avoid float bugs
// ============================================================
const STATE = {
  _balance: 0,           // stored as integer (coins)
  inventory: [],         // { ...item, uuid }
  stats: { opened: 0, sold: 0, earned: 0 },
  txHistory: [],

  get balance() { return this._balance; },
  set balance(v) {
    // always store as rounded integer
    this._balance = Math.round(v);
    renderBalance();
  },

  addBalance(amount) {
    this._balance = Math.round(this._balance + Math.round(amount));
    renderBalance();
  },
  subBalance(amount) {
    this._balance = Math.round(this._balance - Math.round(amount));
    if (this._balance < 0) this._balance = 0;
    renderBalance();
  }
};

// ============================================================
// TELEGRAM INIT
// ============================================================
const tg = window.Telegram?.WebApp;
let userName = 'Игрок';
let userId = '—';

if (tg) {
  tg.ready();
  tg.expand();
  if (tg.initDataUnsafe?.user) {
    const u = tg.initDataUnsafe.user;
    userName = u.first_name || 'Игрок';
    userId = 'ID: ' + u.id;
  }
}

// ============================================================
// RENDER BALANCE
// ============================================================
function renderBalance() {
  document.getElementById('balanceDisplay').textContent = STATE.balance.toLocaleString('ru');
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = color || 'var(--text)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// NAV
// ============================================================
function setPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'inventory') renderInventory();
  if (name === 'profile') renderProfile();
  if (name === 'topup') renderTopup();
}

// ============================================================
// RENDER CASES
// ============================================================
function renderCases() {
  const grid = document.getElementById('casesGrid');
  grid.innerHTML = '';
  CASES.forEach(c => {
    const div = document.createElement('div');
    div.className = 'case-card' + (c.featured ? ' featured' : '');
    div.innerHTML = `
      <div class="case-card-img" style="--glow-color:${c.glow}">
        <div class="case-bg"></div>
        <div class="case-emoji">${c.emoji}</div>
        ${c.featured ? '<div class="case-badge">ХИТ</div>' : ''}
      </div>
      <div class="case-info">
        <div class="case-name">${c.name}</div>
        <div class="case-price">
          <span style="font-size:14px">₮</span>
          <span class="case-price-val">${c.price}</span>
        </div>
      </div>`;
    div.onclick = () => openCaseModal(c);
    grid.appendChild(div);
  });
}

// ============================================================
// ROULETTE
// ============================================================
let currentCase = null;
let isSpinning = false;
let wonItem = null;

function openCaseModal(c) {
  currentCase = c;
  wonItem = null;
  isSpinning = false;
  document.getElementById('modalTitle').textContent = c.emoji + ' ' + c.name;
  document.getElementById('openCaseBtn').disabled = false;
  document.getElementById('openCaseBtn').textContent = '🔓 ОТКРЫТЬ — ₮' + c.price;
  document.getElementById('resultBox').classList.remove('show');
  buildDropsTable(c);
  buildRoulette(c);
  document.getElementById('openModal').classList.remove('hidden');
}

document.getElementById('modalClose').onclick = () => {
  document.getElementById('openModal').classList.add('hidden');
};

function buildDropsTable(c) {
  const dt = document.getElementById('dropsTable');
  dt.innerHTML = c.items.map(item => `
    <div class="drops-row">
      <div class="drops-emoji">${item.emoji}</div>
      <div class="drops-info">
        <div class="drops-name">${item.name}</div>
        <div class="drops-rarity">
          <span class="rarity-dot" style="background:${RARITY_COLORS[item.rarity]}"></span>
          ${RARITY_NAMES[item.rarity]}
        </div>
      </div>
      <div>
        <div class="drops-chance rarity-${item.rarity}">${item.chance}%</div>
        <div style="font-size:11px;color:var(--gold2);text-align:right">₮${item.value}</div>
      </div>
    </div>`).join('');
}

function buildRoulette(c) {
  const track = document.getElementById('rouletteTrack');
  // fill with 60 random items (weighted)
  const items = [];
  for (let i = 0; i < 60; i++) items.push(weightedRandom(c.items));
  track.innerHTML = items.map(item => `
    <div class="roulette-item">
      <div class="roulette-item-emoji">${item.emoji}</div>
      <div class="roulette-item-rarity ri-${item.rarity}"></div>
    </div>`).join('');
  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';
}

function weightedRandom(items) {
  const total = items.reduce((s, i) => s + i.chance, 0);
  let r = Math.random() * total;
  for (const item of items) {
    r -= item.chance;
    if (r <= 0) return item;
  }
  return items[items.length - 1];
}

document.getElementById('openCaseBtn').onclick = () => {
  if (isSpinning) return;
  if (!currentCase) return;
  if (STATE.balance < currentCase.price) {
    showToast('❌ Недостаточно монет!', 'var(--red)');
    return;
  }
  spinRoulette();
};

function spinRoulette() {
  isSpinning = true;
  const btn = document.getElementById('openCaseBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Открываем...';

  // deduct cost immediately
  STATE.subBalance(currentCase.price);
  STATE.stats.opened++;

  // pick winning item
  wonItem = weightedRandom(currentCase.items);

  // rebuild roulette with winner at a fixed position
  const track = document.getElementById('rouletteTrack');
  const ITEM_W = 100;
  const TOTAL = 60;
  const WIN_POS = 46; // index where winner lands (near end)

  const items = [];
  for (let i = 0; i < TOTAL; i++) {
    if (i === WIN_POS) items.push(wonItem);
    else items.push(weightedRandom(currentCase.items));
  }

  track.innerHTML = items.map(item => `
    <div class="roulette-item">
      <div class="roulette-item-emoji">${item.emoji}</div>
      <div class="roulette-item-rarity ri-${item.rarity}"></div>
    </div>`).join('');
  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';

  const containerW = document.getElementById('rouletteContainer').offsetWidth;
  const center = containerW / 2;
  // offset so WIN_POS item center aligns with pointer
  // add small random offset within item for realism
  const jitter = Math.round((Math.random() - 0.5) * 40);
  const finalX = -(WIN_POS * ITEM_W - center + ITEM_W / 2 + jitter);

  // force reflow before animating
  void track.offsetWidth;
  track.style.transition = 'transform cubic-bezier(0.05, 0.5, 0.3, 1) 5s';
  track.style.transform = `translateX(${finalX}px)`;

  setTimeout(() => {
    isSpinning = false;
    showResult(wonItem);
  }, 5200);
}

function showResult(item) {
  const rb = document.getElementById('resultBox');
  const re = document.getElementById('resultEmoji');
  const rn = document.getElementById('resultName');
  const rv = document.getElementById('resultValue');

  re.textContent = item.emoji;
  re.className = 'result-item-big b-' + item.rarity;
  rn.textContent = item.name;
  rn.className = 'result-name rarity-' + item.rarity;
  rv.textContent = RARITY_NAMES[item.rarity] + ' · ₮' + item.value;
  rb.classList.add('show');

  document.getElementById('openCaseBtn').textContent = '🔓 ОТКРЫТЬ ЕЩЁ — ₮' + currentCase.price;
  document.getElementById('openCaseBtn').disabled = false;

  if (tg?.HapticFeedback) {
    if (item.rarity === 'legendary') tg.HapticFeedback.notificationOccurred('success');
    else if (item.rarity === 'epic') tg.HapticFeedback.impactOccurred('heavy');
    else tg.HapticFeedback.impactOccurred('light');
  }
}

document.getElementById('resultSellBtn').onclick = () => {
  if (!wonItem) return;
  STATE.addBalance(wonItem.value);
  STATE.stats.sold++;
  STATE.stats.earned = Math.round(STATE.stats.earned + wonItem.value);
  showToast('✅ Продано за ₮' + wonItem.value, 'var(--green)');
  wonItem = null;
  document.getElementById('resultBox').classList.remove('show');
};

document.getElementById('resultKeepBtn').onclick = () => {
  if (!wonItem) return;
  STATE.inventory.push({ ...wonItem, uuid: Date.now() + Math.random() });
  showToast('📦 Добавлено в инвентарь!');
  wonItem = null;
  document.getElementById('resultBox').classList.remove('show');
};

// ============================================================
// TOPUP
// ============================================================
function renderTopup() {
  const grid = document.getElementById('topupGrid');
  grid.innerHTML = TOPUP_OPTIONS.map(o => `
    <div class="topup-btn" onclick="doTopup(${o.amount})">
      <div class="topup-amount">${o.label}</div>
      <div class="topup-price">монет</div>
    </div>`).join('');

  const hist = document.getElementById('txHistory');
  if (STATE.txHistory.length === 0) {
    hist.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text2);font-size:13px;">Нет транзакций</div>';
    return;
  }
  hist.innerHTML = STATE.txHistory.slice().reverse().slice(0, 10).map(tx => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border-radius:10px;margin-bottom:6px;border:1px solid var(--border);">
      <span style="font-size:13px;color:var(--text2)">${tx.label}</span>
      <span style="font-weight:700;color:var(--green)">+₮${tx.amount}</span>
    </div>`).join('');
}

function doTopup(amount) {
  STATE.addBalance(amount);
  STATE.txHistory.push({ amount, label: 'Пополнение', time: Date.now() });
  showToast('💰 +₮' + amount + ' зачислено', 'var(--green)');
  renderTopup();
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
}

// ============================================================
// INVENTORY
// ============================================================
function renderInventory() {
  const grid = document.getElementById('invGrid');
  const total = document.getElementById('invTotal');

  if (STATE.inventory.length === 0) {
    grid.innerHTML = `<div class="empty-inv" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/></svg>
      <div>Инвентарь пуст</div>
      <div style="font-size:12px;margin-top:4px;">Открывай кейсы!</div>
    </div>`;
    total.textContent = '';
    return;
  }

  const totalVal = STATE.inventory.reduce((s, i) => s + i.value, 0);
  total.textContent = '₮' + totalVal.toLocaleString('ru');

  grid.innerHTML = STATE.inventory.map(item => `
    <div class="inv-item b-${item.rarity}">
      <div class="inv-emoji">${item.emoji}</div>
      <div class="inv-name">${item.name}</div>
      <div class="inv-val">₮${item.value}</div>
      <button class="inv-sell-mini" onclick="sellInvItem(${item.uuid})">Продать</button>
    </div>`).join('');
}

function sellInvItem(uuid) {
  const idx = STATE.inventory.findIndex(i => i.uuid === uuid);
  if (idx === -1) return;
  const item = STATE.inventory[idx];
  STATE.inventory.splice(idx, 1);
  STATE.addBalance(item.value);
  STATE.stats.sold++;
  STATE.stats.earned = Math.round(STATE.stats.earned + item.value);
  showToast('✅ Продано за ₮' + item.value, 'var(--green)');
  renderInventory();
}

// ============================================================
// PROFILE
// ============================================================
function renderProfile() {
  const initials = userName.slice(0, 2).toUpperCase();
  document.getElementById('profileAvatar').textContent = initials;
  document.getElementById('profileName').textContent = userName;
  document.getElementById('profileId').textContent = userId;
  document.getElementById('statOpened').textContent = STATE.stats.opened;
  document.getElementById('statSold').textContent = STATE.stats.sold;
  document.getElementById('statEarned').textContent = STATE.stats.earned.toLocaleString('ru');
}

// ============================================================
// INIT
// ============================================================
renderCases();
renderBalance();
</script>

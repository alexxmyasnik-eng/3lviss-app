<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-top: 60px; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #0f0; box-sizing: border-box; z-index: 1000; }
        .balance-top { color: #0f0; font-weight: bold; font-size: 18px; }
        
        .tab-content { display: none; text-align: center; height: calc(100vh - 120px); overflow-y: auto; padding: 10px; }
        .active { display: block; }

        /* СЕТКА КЕЙСОВ */
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 10px; }
        .case-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; transition: 0.3s; }
        .case-card:active { transform: scale(0.95); border-color: #0f0; }
        .case-card img { width: 100%; max-width: 100px; }
        .case-price { color: #0f0; font-weight: bold; margin-top: 10px; }

        /* РУЛЕТКА */
        .roulette-wrapper { position: relative; width: 100%; height: 180px; background: #0a0a0a; border: 1px solid #222; overflow: hidden; margin-top: 10px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: #f00; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; }
        .item-card { min-width: 130px; height: 180px; display: flex; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; }
        .item-card img { width: 80px; }

        /* КНОПКИ */
        .controls { margin-top: 20px; }
        .main-btn { width: 100%; height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; }
        .spin-btn { background: #0f0; color: #000; }
        .choice-group { display: none; gap: 10px; }
        .keep-btn { background: #333; color: #fff; flex: 1; }
        .sell-btn { background: #f00; color: #fff; flex: 1; }

        /* СКЛАД */
        .inv-item { background: #111; border: 1px solid #333; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        .inv-btns { display: flex; gap: 5px; margin-top: 10px; }
        .inv-btn { flex: 1; height: 35px; border-radius: 8px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-withdraw { background: #007bff; color: #fff; }
        .btn-sell { background: #dc3545; color: #fff; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 11px; font-weight: bold; }
        .nav-item.active-tab { color: #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <span id="user-nick">@User</span>
        <div class="balance-top" id="balance-val">0 ★</div>
    </div>

    <div id="shop" class="tab-content active">
        <h3 style="color:#555">ВЫБЕРИ КЕЙС</h3>
        <div class="case-grid">
            <div class="case-card" onclick="openCase(222)">
                <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png">
                <div>Lite Case</div>
                <div class="case-price">222 ★</div>
            </div>
            <div class="case-card" onclick="openCase(444)">
                <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png">
                <div>Lucky Case</div>
                <div class="case-price">444 ★</div>
            </div>
            <div class="case-card" onclick="openCase(888)">
                <img src="https://cdn-icons-png.flaticon.com/512/679/679821.png">
                <div>Elite Case</div>
                <div class="case-price">888 ★</div>
            </div>
        </div>
    </div>

    <div id="roulette-screen" class="tab-content">
        <button onclick="openTab('shop')" style="background:none; border:none; color:#555; float:left;">⬅ Назад</button>
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <div class="controls">
            <button id="spinBtn" class="main-btn spin-btn">КРУТИТЬ</button>
            <div id="choice-btns" class="choice-group">
                <button class="main-btn keep-btn" onclick="handleChoice('keep')">ОСТАВИТЬ</button>
                <button class="main-btn sell-btn" onclick="handleChoice('sell')">ПРОДАТЬ</button>
            </div>
        </div>
    </div>

    <div id="inventory" class="tab-content">
        <h3 style="color:#0f0">🎒 МОЙ СКЛАД</h3>
        <div id="inv-list"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-tab" onclick="openTab('shop')">🎰 КЕЙСЫ</div>
        <div class="nav-item" onclick="openTab('inventory')">🎒 СКЛАД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        let currentPrice = 0;
        let balance = new URLSearchParams(window.location.search).get('balance') || 0;
        document.getElementById('balance-val').innerText = balance + " ★";

        const items = [
            { name: "Ice Cream", img: "1.png", price: 100 },
            { name: "Gift", img: "2.png", price: 200 },
            { name: "Cigar", img: "3.png", price: 300 }
        ];

        let inventory = [];
        let winItem = null;

        function openCase(price) {
            currentPrice = price;
            document.getElementById('spinBtn').innerText = `ОТКРЫТЬ ЗА ${price} ★`;
            openTab('roulette-screen');
            fillTape();
        }

        function fillTape() {
            const tape = document.getElementById('tape');
            tape.innerHTML = '';
            for(let i=0; i<60; i++) {
                const it = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="item-card"><img src="${it.img}"></div>`;
            }
        }

        function startSpin() {
            if(balance < currentPrice) { tg.showAlert("Мало звезд!"); return; }
            balance -= currentPrice;
            document.getElementById('balance-val').innerText = balance + " ★";
            tg.sendData(JSON.stringify({action: "spin", price: currentPrice}));

            document.getElementById('spinBtn').style.display = 'none';
            const tape = document.getElementById('tape');
            const stopIdx = 45;
            winItem = items[Math.floor(Math.random()*items.length)];
            tape.children[stopIdx].innerHTML = `<img src="${winItem.img}">`;

            tape.style.transition = "transform 5s cubic-bezier(0.1, 0, 0.1, 1)";
            const offset = -(stopIdx * 130) + (window.innerWidth / 2) - 65;
            tape.style.transform = `translateX(${offset}px)`;

            setTimeout(() => {
                document.getElementById('choice-btns').style.display = 'flex';
            }, 5500);
        }

        document.getElementById('spinBtn').onclick = startSpin;

        function handleChoice(type) {
            if(type === 'keep') {
                inventory.push(winItem);
                renderInventory();
                tg.sendData(JSON.stringify({action: "save", item: winItem.name}));
            } else {
                let sellPrice = Math.floor(currentPrice * 0.5);
                balance = parseInt(balance) + sellPrice;
                tg.sendData(JSON.stringify({action: "sell", price: sellPrice}));
            }
            document.getElementById('balance-val').innerText = balance + " ★";
            openTab('shop');
        }

        function renderInventory() {
            const list = document.getElementById('inv-list');
            list.innerHTML = '';
            inventory.forEach((it, idx) => {
                list.innerHTML += `
                    <div class="inv-item">
                        <img src="${it.img}" width="50">
                        <b>${it.name}</b>
                        <div class="inv-btns">
                            <button class="inv-btn btn-withdraw" onclick="withdraw(${idx})">ВЫВОД</button>
                            <button class="inv-btn btn-sell" onclick="sellFromInv(${idx})">ПРОДАТЬ</button>
                        </div>
                    </div>`;
            });
        }

        function withdraw(idx) {
            const item = inventory[idx];
            tg.sendData(JSON.stringify({action: "withdraw", item: item.name}));
            tg.showAlert("Заявка на вывод отправлена админу!");
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 50px; background: #111; display: flex; align-items: center; justify-content: space-around; border-bottom: 2px solid #0f0; z-index: 100; }
        
        #pop { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 85%; background: #1a1a1a; border: 1px solid #0f0; padding: 15px; border-radius: 12px; transition: 0.5s; z-index: 200; box-shadow: 0 0 15px #0f0; text-align: center; }
        #pop.show { top: 10px; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #555; }
        .nav-btn.active { color: #0f0; }

        .tab { display: none; height: calc(100vh - 110px); overflow-y: auto; padding: 10px; margin-top: 50px; }
        .tab.active { display: block; }

        .case-card { background: #111; border: 1px solid #333; margin: 10px; padding: 15px; border-radius: 15px; text-align: center; }
        .btn-open { background: #0f0; color: #000; border: none; width: 100%; height: 40px; border-radius: 8px; font-weight: bold; margin-top: 10px; }

        /* Рулетка */
        #roulette-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 300; display: none; align-items: center; justify-content: center; flex-direction: column; }
        .roulette-box { position: relative; width: 100%; height: 120px; border-top: 2px solid #333; border-bottom: 2px solid #333; overflow: hidden; display: flex; align-items: center; }
        .pointer { position: absolute; left: 50%; transform: translateX(-50%); top: 0; width: 4px; height: 100%; background: #0f0; z-index: 10; }
        .strip { display: flex; position: absolute; left: 0; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }
        .strip img { width: 80px; height: 80px; margin: 10px; border: 1px solid #222; border-radius: 10px; background: #111; }
    </style>
</head>
<body>
    <div id="pop"><b>★ ПОПОЛНЕНИЕ!</b><br><span id="pop-amt"></span></div>

    <div class="header">
        <div id="u-bal" style="color:#0f0; font-size: 20px; font-weight: bold;">0 ★</div>
    </div>

    <div id="tab-cases" class="tab active">
        <div class="case-card">
            <img src="1.png" width="80"><h3>LITE</h3><p>222 ★</p>
            <button class="btn-open" onclick="openCase(222)">ОТКРЫТЬ</button>
        </div>
        <div class="case-card">
            <img src="2.png" width="80"><h3>PRO</h3><p>444 ★</p>
            <button class="btn-open" onclick="openCase(444)">ОТКРЫТЬ</button>
        </div>
        <div class="case-card">
            <img src="3.png" width="80"><h3>ELITE</h3><p>888 ★</p>
            <button class="btn-open" onclick="openCase(888)">ОТКРЫТЬ</button>
        </div>
    </div>

    <div id="tab-inv" class="tab">
        <div id="inv-list">Загрузка склада...</div>
    </div>

    <div id="roulette-screen">
        <h2 id="roulette-status">ОТКРЫТИЕ...</h2>
        <div class="roulette-box">
            <div class="pointer"></div>
            <div id="strip" class="strip"></div>
        </div>
        <button id="btn-close" class="btn-open" style="width:200px; display:none;" onclick="closeRoulette()">ЗАКРЫТЬ</button>
    </div>

    <div class="nav">
        <div class="nav-btn active" id="nb-cases" onclick="toTab('cases')">КЕЙСЫ</div>
        <div class="nav-btn" id="nb-inv" onclick="toTab('inv')">СКЛАД</div>
    </div>

    <script>
        const API = "https://king-legibly-mouse.ngrok-free.dev";
        const uid = new URLSearchParams(window.location.search).get('uid');
        let lastG = -1;

        async function sync() {
            try {
                const r = await fetch(`${API}/get_data?uid=${uid}`);
                const d = await r.json();
                document.getElementById('u-bal').innerText = d.bal + " ★";
                
                if (lastG !== -1 && d.g_id > lastG) {
                    const p = document.getElementById('pop');
                    document.getElementById('pop-amt').innerText = `+${d.g_amt} звёзд зачислено!`;
                    p.classList.add('show');
                    setTimeout(() => p.classList.remove('show'), 4000);
                }
                lastG = d.g_id;

                let h = "";
                d.inv.forEach(item => {
                    h += `<div class="case-card"><img src="${item}" width="60"><br>
                        <button class="btn-open" style="background:#00f;color:#fff" onclick="wd('${item}')">ВЫВОД</button></div>`;
                });
                document.getElementById('inv-list').innerHTML = h || "Пусто";
            } catch(e) {}
        }

        async function openCase(cost) {
            const res = await fetch(`${API}/action`, {method:'POST', body:JSON.stringify({uid, act:'open', cost})});
            const data = await res.json();
            if(data.ok) startRoulette(data.win);
            else alert("Недостаточно звёзд!");
        }

        function startRoulette(winImg) {
            const screen = document.getElementById('roulette-screen');
            const strip = document.getElementById('strip');
            const items = ["1.png", "2.png", "3.png"];
            
            screen.style.display = 'flex';
            document.getElementById('btn-close').style.display = 'none';
            document.getElementById('roulette-status').innerText = "КРУТИМ...";
            
            let html = "";
            for(let i=0; i<50; i++) {
                let img = items[Math.floor(Math.random()*3)];
                if(i === 40) img = winImg;
                html += `<img src="${img}">`;
            }
            strip.innerHTML = html;
            strip.style.transition = "none";
            strip.style.transform = "translateX(0)";

            setTimeout(() => {
                strip.style.transition = "transform 4s cubic-bezier(0.1, 0, 0.1, 1)";
                strip.style.transform = "translateX(-3920px)"; // 40 итемов по 100px (80+20)
            }, 100);

            setTimeout(() => {
                document.getElementById('roulette-status').innerText = "ВЫ ВЫБИЛИ!";
                document.getElementById('btn-close').style.display = 'block';
                sync();
            }, 4500);
        }

        async function wd(n) {
            await fetch(`${API}/action`, {method:'POST', body:JSON.stringify({uid, act:'wd', n})});
            alert("Заявка на вывод отправлена!");
            sync();
        }

        function closeRoulette() { document.getElementById('roulette-screen').style.display = 'none'; }
        
        function toTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+name).classList.add('active');
            document.getElementById('nb-'+name).classList.add('active');
        }

        setInterval(sync, 3000); sync();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>

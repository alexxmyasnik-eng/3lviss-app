<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3Lviss Lucky Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; padding: 15px; text-align: center; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #0f0; padding-bottom: 10px; margin-bottom: 20px; }
        .balance { color: #0f0; font-size: 20px; font-weight: bold; }
        .case-card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 20px; margin: 10px 0; cursor: pointer; }
        .btn { background: #0f0; color: #000; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: #111; border-top: 1px solid #222; }
        .nav-btn { flex: 1; padding: 15px; color: #888; text-decoration: none; font-size: 14px; }
        .nav-btn.active { color: #0f0; }
        .inv-item { background: #1a1a1a; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        #roulette { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <span id="name">Игрок</span>
        <span class="balance" id="bal">0 ★</span>
    </div>

    <div id="cases">
        <div class="case-card" onclick="openCase(222)">Кейс LITE — 222 ★</div>
        <div class="case-card" onclick="openCase(555)">Кейс ELITE — 555 ★</div>
    </div>

    <div id="roulette">
        <h2 id="win-text">Крутим...</h2>
        <button class="btn" id="take-btn" onclick="saveItem()">В ИНВЕНТАРЬ</button>
    </div>

    <div id="inv-screen" style="display:none;">
        <h3>Твой Склад</h3>
        <div id="list"></div>
    </div>

    <div class="nav">
        <div class="nav-btn active" onclick="show('cases')">МАГАЗИН</div>
        <div class="nav-btn" onclick="show('inv-screen')">СКЛАД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const uid = new URLSearchParams(window.location.search).get('uid');
        let balance = 0;
        let inventory = [];
        let currentItem = "";

        // Приветствие
        document.getElementById('name').innerText = tg.initDataUnsafe.user?.first_name || "Миша";

        function openCase(price) {
            if (balance < price) return alert("Мало звезд!");
            balance -= price;
            updateUI();
            tg.sendData(JSON.stringify({action: 'spin', price: price}));
            
            document.getElementById('cases').style.display = 'none';
            document.getElementById('roulette').style.display = 'block';
            
            const wins = ["Ice Cream", "Gift Box", "Telegram Premium", "TON"];
            currentItem = wins[Math.floor(Math.random()*wins.length)];
            document.getElementById('win-text').innerText = "Выпало: " + currentItem;
        }

        function saveItem() {
            inventory.push(currentItem);
            tg.sendData(JSON.stringify({action: 'save', item: currentItem}));
            show('cases');
        }

        function withdraw(item) {
            tg.sendData(JSON.stringify({action: 'withdraw', item: item}));
            alert("Заявка отправлена админу!");
            inventory = inventory.filter(i => i !== item);
            renderInv();
        }

        function show(id) {
            document.getElementById('cases').style.display = 'none';
            document.getElementById('inv-screen').style.display = 'none';
            document.getElementById('roulette').style.display = 'none';
            document.getElementById(id).style.display = 'block';
            if(id === 'inv-screen') renderInv();
        }

        function renderInv() {
            const container = document.getElementById('list');
            container.innerHTML = inventory.map(i => `
                <div class="inv-item">
                    <span>${i}</span>
                    <button onclick="withdraw('${i}')" style="background:#007bff; color:#fff; border:none; padding:5px; border-radius:5px;">ВЫВОД</button>
                </div>
            `).join('');
        }

        function updateUI() {
            document.getElementById('bal').innerText = balance + " ★";
        }
        
        // ВАЖНО: Тут мы могли бы делать запрос к API за данными, но для начала 
        // просто берем баланс из ссылки при старте.
        balance = parseInt(new URLSearchParams(window.location.search).get('bal')) || 0;
        updateUI();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .ascii-logo { white-space: pre; font-size: 8px; line-height: 1.2; color: #0f0; margin: 10px 0; }
        .roulette-wrapper { position: relative; width: 100%; height: 180px; margin: 20px 0; border-top: 2px solid #0f0; border-bottom: 2px solid #0f0; overflow: hidden; background: #111; }
        .pointer { position: absolute; left: 50%; top: 0; width: 4px; height: 100%; background: red; z-index: 10; }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); }
        .item { min-width: 130px; height: 100%; border-right: 1px solid #222; display: flex; align-items: center; justify-content: center; flex-direction: column; font-size: 11px; }
        .item img { max-width: 80px; max-height: 80px; margin-bottom: 5px; }
        .btn { background: #0f0; color: #000; padding: 15px 30px; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="ascii-logo">
|‾‾\ |  |   _   ____ 
|  < |  |  | | /  __/
|__/ |__|__|_| \__ \ 
      3 L v i s s
    </div>

    <div class="roulette-wrapper">
        <div class="pointer"></div>
        <div id="tape" class="tape"></div>
    </div>

    <button id="spinBtn" class="btn" onclick="startSpin()">КРУТИТЬ КЕЙС</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const tape = document.getElementById('tape');
        const itemsList = [
            { name: "Ice Cream", img: "1.png" },
            { name: "Xmas Stocking", img: "2.png" },
            { name: "Snoop Cigar", img: "3.png" }
        ];

        // Заполняем ленту заранее
        for (let i = 0; i < 70; i++) {
            const item = itemsList[i % itemsList.length];
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `<img src="${item.img}"><span>${item.name}</span>`;
            tape.appendChild(div);
        }

        function startSpin() {
            const spinBtn = document.getElementById('spinBtn');
            spinBtn.disabled = true;
            spinBtn.innerText = "ПОЕХАЛИ...";

            const itemWidth = 130;
            const stopIndex = 55; // На каком предмете остановимся
            const offset = -(stopIndex * itemWidth) + (window.innerWidth / 2) - (itemWidth / 2);
            
            // Запуск анимации
            tape.style.transform = `translateX(${offset}px)`;

            setTimeout(() => {
                const winItem = itemsList[stopIndex % itemsList.length].name;
                tg.showAlert(`🎉 Вы выбили: ${winItem}`);
                
                // Отправка данных боту
                setTimeout(() => {
                    tg.sendData(JSON.stringify({ action: "open_common", item: winItem }));
                }, 1000);
            }, 5500);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        
        /* ASCII Логотип */
        .ascii-logo { white-space: pre; font-size: 8px; line-height: 1.2; color: #0f0; text-shadow: 0 0 8px #0f0; margin: 10px 0; }

        /* Окно рулетки */
        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 180px;
            margin: 20px 0;
            border-top: 2px solid #0f0;
            border-bottom: 2px solid #0f0;
            overflow: hidden;
            background: #111;
        }

        /* Красная линия-указатель по центру */
        .pointer {
            position: absolute;
            left: 50%;
            top: 0;
            width: 4px;
            height: 100%;
            background: red;
            z-index: 10;
            box-shadow: 0 0 10px red;
        }

        /* Сама лента с предметами */
        .tape {
            display: flex;
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            transition: transform 5s cubic-bezier(0.1, 0, 0, 1); /* Плавное замедление как в CS */
        }

        /* Карточка предмета */
        .item {
            min-width: 130px;
            height: 100%;
            border-right: 1px solid #222;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 11px;
            background: linear-gradient(to bottom, #111, #222);
            padding: 5px;
            box-sizing: border-box;
        }

        .item img {
            max-width: 80px;
            max-height: 80px;
            margin-bottom: 5px;
            object-fit: contain;
        }

        /* Цвета редкости */
        .common { border-bottom: 5px solid gray; }
        .rare { border-bottom: 5px solid #0cf; }
        .legendary { border-bottom: 5px solid #f0f; }

        .price { font-size: 20px; color: #fff; margin: 10px 0; }
        .btn { background: #0f0; color: #000; padding: 15px 30px; border: none; font-weight: bold; border-radius: 5px; margin-top: 10px; cursor: pointer; }
        .btn:disabled { background: #555; }
    </style>
</head>
<body>

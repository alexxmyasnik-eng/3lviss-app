<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-top: 60px; overflow: hidden; -webkit-user-select: none; }
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #0f0; box-sizing: border-box; z-index: 1000; }
        .balance-top { color: #0f0; font-weight: bold; font-size: 18px; }
        
        .tab-content { display: none; text-align: center; height: calc(100vh - 120px); overflow: auto; }
        .active { display: block; }

        /* РУЛЕТКА */
        .roulette-wrapper { position: relative; width: 100%; height: 210px; background: #0a0a0a; border: 1px solid #222; overflow: hidden; margin-top: 20px; box-sizing: border-box;}
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: #f00; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 15px rgba(255,0,0,0.6); }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; will-change: transform; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); }
        
        .item-card { min-width: 140px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; padding: 10px; box-sizing: border-box;}
        .item-card img { width: 90px; height: 90px; display: block;}
        .item-card span { font-size: 12px; margin-top: 10px; color: #444; }

        /* КНОПКИ */
        .controls { margin-top: 30px; padding: 0 20px; }
        .main-btn { width: 100%; height: 55px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; margin-bottom: 12px;}
        .spin-btn { background: #0f0; color: #000; box-shadow: 0 0 20px rgba(0,255,0,0.4); }
        
        .choice-group { display: none; gap: 15px; }
        .keep-btn { background: #333; color: #fff; flex: 1; }
        .sell-btn { background: #f00; color: #fff; flex: 1; }

        /* СКЛАД */
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .inv-item { background: #111; border: 1px solid #333; padding: 10px; border-radius: 10px; display: flex; flex-direction: column; align-items: center;}
        .inv-item img { width: 60px; height: 60px; margin-bottom: 5px; }
        .inv-item span { font-size: 12px; color: #fff; font-weight: bold; text-align: center; }

        /* НАВИГАЦИЯ */
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; gap: 5px;}
        .nav-item.active-tab { color: #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="user-photo" class="avatar" style="width:34px;height:34px;border-radius:50%;display:none;">
            <span id="user-nick" style="color:#fff;">@Guest</span>
        </div>
        <div class="balance-top" id="balance-val">0 ★</div>
    </div>

    <div id="cases" class="tab-content active">
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <div class="controls">
            <button id="spinBtn" class="main-btn spin-btn" onclick="startSpin()">ОТКРЫТЬ ЗА 444 ★</button>
            <div id="choice-btns" class="choice-group">
                <button class="main-btn keep-btn" onclick="handleChoice('keep')">ОСТАВИТЬ</button>
                <button class="main-btn sell-btn" onclick="handleChoice('sell')">ПРОДАТЬ ЗА 200 ★</button>
            </div>
        </div>
    </div>

    <div id="upgrades" class="tab-content">
        <h2 style="margin-top:80px; color:#555;">⚡ АПГРЕЙДЫ</h2>
        <p style="color:#888;">Скоро здесь появится круглый оверлей для умножения...</p>
    </div>

    <div id="inventory" class="tab-content">
        <h3 style="color:#0f0; margin-top:20px;">🎒 ТВОЙ СКЛАД</h3>
        <div id="inv-grid" class="inv-grid"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-tab" onclick="openTab('cases', this)">🎰 Кейсы</div>
        <div class="nav-item" onclick="openTab('upgrades', this)">⚡ Апгрейды</div>
        <div class="nav-item" onclick="openTab('inventory', this)">🎒 Склад</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe?.user;
        document.getElementById('user-nick').innerText = user ? (user.username ? '@' + user.username : user.first_name) : "@Guest";
        if(user && user.photo_url) {
            document.getElementById('user-photo').src = user.photo_url;
            document.getElementById('user-photo').style.display = 'block';
        }

        const params = new URLSearchParams(window.location.search);
        let balance = parseInt(params.get('balance')) || 0;
        document.getElementById('balance-val').innerText = balance + " ★";

        // Данные предметов
        const items_data = [
            { id: 1, name: "Ice Cream", img: "1.png" },
            { id: 2, name: "Gift Box", img: "2.png" },
            { id: 3, name: "Snoop Cigar", img: "3.png" }
        ];

        let inventoryList = [];
        const tape = document.getElementById('tape');
        const itemWidth = 140; // Ширина item-card (с учетом padding)
        const choiceBtns = document.getElementById('choice-btns');
        const spinBtn = document.getElementById('spinBtn');
        let winItem = null;

        function fillTape() {
            tape.innerHTML = '';
            for(let i=0; i<80; i++) {
                const it = items_data[Math.floor(Math.random() * items_data.length)];
                tape.innerHTML += `
                    <div class="item-card">
                        <img src="${it.img}">
                        <span style="opacity:0.2">???</span>
                    </div>
                `;
            }
        }
        fillTape();

        function startSpin() {
            if(balance < 444) { tg.showAlert("Недостаточно звезд!"); return; }
            balance -= 444;
            document.getElementById('balance-val').innerText = balance + " ★";
            tg.sendData(JSON.stringify({action: "spin_pay"}));

            spinBtn.style.display = 'none';
            choiceBtns.style.display = 'none';
            
            // Сброс tape без анимации
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";

            // Костыль, чтобы transition:none применился
            setTimeout(() => {
                const stopIndex = 55; // На каком предмете остановиться
                winItem = items_data[Math.floor(Math.random() * items_data.length)];
                
                // Вставляем победный предмет
                const stopCard = tape.children[stopIndex];
                stopCard.querySelector('img').src = winItem.img;
                stopCard.querySelector('span').innerText = winItem.name;
                stopCard.querySelector('span').style.id = 'win-text'; // Для селектора

                // РАСЧЕТ ОСТАНОВКИ ТОЧНО В ЦЕНТР
                tape.style.transition = "transform 6s cubic-bezier(0.15, 0, 0.15, 1)";
                const wrapCenter = window.innerWidth / 2;
                const offset = -(stopIndex * itemWidth) + (wrapCenter) - (itemWidth / 2);
                tape.style.transform = `translateX(${offset}px)`;

                setTimeout(() => {
                    // Загорается текст
                    const txt = stopCard.querySelector('span');
                    txt.style.opacity = '1';
                    txt.style.color = '#0f0';
                    txt.style.fontWeight = 'bold';
                    choiceBtns.style.display = 'flex';
                }, 6000);
            }, 50);
        }

        function handleChoice(type) {
            if(type === 'keep') {
                inventoryList.push(winItem);
                updateInventoryUI();
                tg.sendData(JSON.stringify({action: "save_only", item: winItem.name}));
            } else {
                balance += 200;
                tg.sendData(JSON.stringify({action: "sell_only", item: winItem.name}));
            }
            document.getElementById('balance-val').innerText = balance + " ★";
            choiceBtns.style.display = 'none';
            spinBtn.style.display = 'block';
            fillTape(); // Перезапуск tape для следующего раза
        }

        function updateInventoryUI() {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            inventoryList.forEach(it => {
                grid.innerHTML += `<div class="inv-item"><img src="${it.img}"><span>${it.name}</span></div>`;
            });
        }

        function openTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active-tab');
        }
    </script>
</body>
</html>

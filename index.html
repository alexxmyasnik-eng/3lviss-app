<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; padding: 15px; }
        .ascii-logo { white-space: pre; font-size: 8px; line-height: 1.2; color: #0f0; text-shadow: 0 0 8px #0f0; margin: 10px 0; }
        .case-card { border: 1px solid #0f0; border-radius: 12px; padding: 15px; background: #111; box-shadow: 0 0 10px #0f0; margin-bottom: 20px; }
        .case-card h2 { margin: 5px 0; font-size: 18px; }
        .price { font-size: 20px; color: #fff; margin: 10px 0; }
        .btn { background: #0f0; color: #000; border: none; padding: 12px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 6px; font-size: 16px; text-transform: uppercase; }
        .btn:active { transform: scale(0.98); background: #0a0; }
        .game-50-50 { border-color: #ff0; box-shadow: 0 0 10px #ff0; }
        .game-50-50 h2 { color: #ff0; }
        .btn-50 { background: #ff0; }
    </style>
</head>
<body>

    <div class="ascii-logo">
|‾‾\ |  |   _   ____ 
|  < |  |  | | /  __/
|__/ |__|__|_| \__ \ 
      3 L v i s s
    </div>

    <div class="case-card">
        <h2>🚀 COMMON CASE</h2>
        <div class="price">444 ★</div>
        <button class="btn" onclick="sendAction('open_common')">ОТКРЫТЬ</button>
    </div>

    <div class="case-card" style="border-color: #0cf; box-shadow: 0 0 10px #0cf;">
        <h2 style="color: #0cf;">💎 RARE CASE</h2>
        <div class="price">1444 ★</div>
        <button class="btn" style="background: #0cf;" onclick="sendAction('open_rare')">ОТКРЫТЬ</button>
    </div>

    <div class="case-card game-50-50">
        <h2>🎲 GAME 50/50</h2>
        <div class="price">100 ★</div>
        <button class="btn btn-50" onclick="sendAction('play_50_50')">РИСКНУТЬ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем приложение

        function sendAction(actionType) {
            // Подтверждение перед действием
            let text = actionType.includes('open') ? "Открыть кейс?" : "Поставить 100 звезд?";
            
            tg.showConfirm(text, (confirmed) => {
                if (confirmed) {
                    // Отправляем данные боту
                    tg.sendData(JSON.stringify({
                        action: actionType,
                        user_id: tg.initDataUnsafe.user.id
                    }));
                    tg.close(); // Закрываем приложение после нажатия
                }
            });
        }
    </script>
</body>
</html>

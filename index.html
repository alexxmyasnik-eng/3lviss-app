<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3lviss App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- 1. Верхний блок: Информация о пользователе -->
        <header class="user-profile">
            <img src="https://via.placeholder.com/48" alt="User Avatar" class="avatar">
            <span class="username">Имя Пользователя</span>
        </header>

        <!-- 2. Основной контент: Кейс -->
        <main class="main-content">
            <div class="case-container">
                <!-- Иконка кейса (SVG-код) -->
                <div class="case-icon">
                    <svg width="128" height="128" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M85 35H15C12.2386 35 10 37.2386 10 40V80C10 82.7614 12.2386 85 15 85H85C87.7614 85 90 82.7614 90 80V40C90 37.2386 87.7614 35 85 35Z" fill="url(#paint0_linear_101_2)"/><path d="M85 20H15C12.2386 20 10 22.2386 10 25V35H90V25C90 22.2386 87.7614 20 85 20Z" fill="url(#paint1_linear_101_2)"/><path d="M50 45C48.8954 45 48 45.8954 48 47V53C48 54.1046 48.8954 55 50 55C51.1046 55 52 54.1046 52 53V47C52 45.8954 51.1046 45 50 45Z" fill="#FFD700"/><defs><linearGradient id="paint0_linear_101_2" x1="50" y1="35" x2="50" y2="85" gradientUnits="userSpaceOnUse"><stop stop-color="#8E2DE2"/><stop offset="1" stop-color="#4A00E0"/></linearGradient><linearGradient id="paint1_linear_101_2" x1="50" y1="20" x2="50" y2="35" gradientUnits="userSpaceOnUse"><stop stop-color="#A450E5"/><stop offset="1" stop-color="#6A10E0"/></linearGradient></defs></svg>
                </div>
                <div class="case-price">
                    222 ⭐
                </div>
                <div class="case-contents">
                    <p>Возможное содержимое:</p>
                    <ul>
                        <li>✨ Предмет 1 (Редкий)</li>
                        <li>🔹 Предмет 2 (Обычный)</li>
                        <li>🔹 Предмет 3 (Обычный)</li>
                        <li>🔥 Предмет 4 (Легендарный)</li>
                    </ul>
                </div>
                <button class="action-button">Открыть за 222 ⭐</button>
            </div>
        </main>

        <!-- 3. Нижнее меню -->
        <nav class="bottom-nav">
            <button class="nav-button active">Кейсы</button>
            <button class="nav-button">Инвентарь</button>
        </nav>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-top: 60px; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 60px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #0f0; z-index: 1000; box-sizing: border-box; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #333; border: 1px solid #0f0; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .balance-top { color: #0f0; font-weight: bold; font-size: 18px; }
        
        /* КЕЙСЫ И СКЛАД */
        .tab-content { display: none; text-align: center; height: calc(100vh - 120px); overflow-y: auto; padding-bottom: 20px; }
        .active { display: block; }
        .item-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 15px; margin: 10px; display: flex; flex-direction: column; align-items: center; }
        .item-card img { width: 80px; height: 80px; margin-bottom: 10px; }
        
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 90%; background: #1a1a1a; border: 1px solid #0f0; border-radius: 12px; padding: 12px; z-index: 3000; transition: 0.6s; }
        #toast.show { bottom: 80px; }
        
        .btn { width: 90%; height: 45px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin: 5px; }
        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-weight: bold; }
        .active-tab { color: #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <div class="avatar" id="avatar"><img src="https://img.icons8.com/ios-filled/50/00ff00/user-male-circle.png"></div>
            <div id="nickname" style="font-weight:bold; font-size:14px;">Загрузка...</div>
        </div>
        <div class="balance-top" id="bal">0 ★</div>
    </div>

    <div id="toast">🔔 <span id="toast-msg"></span></div>

    <div id="shop" class="tab-content active">
        <div style="padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="item-card" onclick="openCase(222, 'Lite')"><b>Lite</b><span style="color:#0f0">222 ★</span></div>
            <div class="item-card" onclick="openCase(444, 'Lucky')"><b>Lucky</b><span style="color:#0f0">444 ★</span></div>
            <div class="item-card" onclick="openCase(888, 'Elite')"><b>Elite</b><span style="color:#0f0">888 ★</span></div>
        </div>
    </div>

    <div id="game" class="tab-content">
        <h2 id="g-title">Кейс</h2>
        <div style="height:150px; overflow:hidden; position:relative; background:#0a0a0a; border:1px solid #222; margin: 20px 0;">
            <div style="position:absolute; left:50%; width:2px; height:100%; background:red; z-index:10;"></div>
            <div id="tape" style="display:flex; transition: 5s cubic-bezier(0.15, 0, 0.15, 1);"></div>
        </div>
        <div id="drop-info" style="display:none; margin-bottom: 20px;">
            <img id="drop-img" src="" style="width:100px;">
            <h3 id="drop-name" style="margin:5px 0;">Предмет</h3>
            <p id="drop-price" style="color:#0f0;">0 ★</p>
        </div>
        <button id="spinBtn" class="btn" style="background:#0f0; color:#000;" onclick="startSpin()">ОТКРЫТЬ</button>
        <div id="post-game" style="display:none;">
            <button class="btn" style="background:#333; color:#fff;" onclick="saveItem()">НА СКЛАД</button>
            <button class="btn" style="background:#f00; color:#fff;" onclick="sellInstant()">ПРОДАТЬ</button>
        </div>
    </div>

    <div id="inv" class="tab-content">
        <div id="inv-list"></div>
    </div>

    <div class="nav">
        <div class="nav-item active-tab" id="n-shop" onclick="toTab('shop')">КЕЙСЫ</div>
        <div class="nav-item" id="n-inv" onclick="toTab('inv')">СКЛАД</div>
    </div>

    <script>
        const API_URL = "https://king-legibly-mouse.ngrok-free.dev"; 
        const tg = window.Telegram.WebApp;
        const uid = new URLSearchParams(window.location.search).get('uid');
        let balance = 0, currentDrop = null, lastGId = 0;

        // ИНИЦИАЛИЗАЦИЯ (ИМЯ И АВАТАР)
        const user = tg.initDataUnsafe?.user;
        document.getElementById('nickname').innerText = user ? (user.first_name + (user.last_name ? " " + user.last_name : "")) : "Player";
        if(user?.photo_url) document.querySelector('#avatar img').src = user.photo_url;

        async function loadData() {
            try {
                const r = await fetch(`${API_URL}/get_data?uid=${uid}`);
                const d = await r.json();
                balance = d.balance;
                document.getElementById('bal').innerText = balance + " ★";
                
                // Склад
                const list = document.getElementById('inv-list');
                list.innerHTML = d.inventory.length ? "" : "<p style='margin-top:50px;'>Склад пуст</p>";
                d.inventory.forEach(i => {
                    list.innerHTML += `<div class="item-card"><img src="${i.img}"><b>${i.name}</b><span style="color:#0f0">${i.price} ★</span>
                    <button class="btn" style="background:#f00; color:#fff; height:30px;" onclick="sellItem(${i.id}, ${i.price})">ПРОДАТЬ</button></div>`;
                });
            } catch(e) {}
        }
        setInterval(loadData, 3000); loadData();

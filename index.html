<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Lviss HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-top: 60px; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #0f0; box-sizing: border-box; z-index: 1000; }
        .avatar { width: 34px; height: 34px; border-radius: 50%; border: 1px solid #0f0; background: #222; }
        .balance-top { color: #0f0; font-weight: bold; }

        .tab-content { display: none; text-align: center; height: calc(100vh - 120px); overflow-y: auto; }
        .active { display: block; }

        /* ТАПЕ / РУЛЕТКА */
        .roulette-wrapper { position: relative; width: 100%; height: 180px; background: #0a0a0a; border: 1px solid #222; overflow: hidden; margin-top: 20px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 3px; height: 100%; background: #f00; z-index: 10; transform: translateX(-50%); box-shadow: 0 0 10px #f00; }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; will-change: transform; }
        .item-card { min-width: 130px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; }
        .item-card img { width: 80px; height: 80px; }
        .item-card span { font-size: 11px; margin-top: 10px; color: #444; }

        /* КНОПКИ */
        .controls { margin-top: 30px; padding: 0 20px; }
        .main-btn { width: 100%; height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .spin-btn { background: #0f0; color: #000; }
        .choice-group { display: none; gap: 10px; }
        .keep-btn { background: #333; color: #fff; flex: 1; }
        .sell-btn { background: #f00; color: #fff; flex: 1; }

        /* ИНВЕНТАРЬ */
        .inv-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .inv-item { background: #111; border: 1px solid #333; padding: 10px; border-radius: 10px; }
        .inv-item img { width: 60px; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 65px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 10px; }
        .nav-item.active-tab { color: #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; align-items:center; gap:10px;">
            <img id="user-photo" class="avatar" style="display:none;">
            <span id="user-nick" style="font-size:14px;">@User</span>
        </div>
        <div class="balance-top" id="balance-val">0 ★</div>
    </div>

    <div id="cases" class="tab-content active">
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <div class="controls">
            <button id="spinBtn" class="main-btn spin-btn" onclick="startSpin()">ОТКРЫТЬ ЗА 444 ★</button>
            <div id="choice-btns" class="choice-group">
                <button class="main-btn keep-btn" onclick="handleChoice('keep')">ОСТАВИТЬ</button>
                <button class="main-btn sell-btn" onclick="handleChoice('sell')">ПРОДАТЬ ЗА 200</button>
            </div>
        </div>
    </div>

    <div id="upgrades" class="tab-content">
        <h2 style="margin-top:50px; color:#333;">АПГРЕЙДЫ</h2>
        <p>Скоро...</p>
    </div>

    <div id="inventory" class="tab-content">
        <h3 style="color:#0f0;">ВАШ СКЛАД</h3>
        <div id="inv-grid" class="inv-grid"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-tab" onclick="openTab('cases', this)">🎰 КЕЙСЫ</div>
        <div class="nav-item" onclick="openTab('upgrades', this)">⚡ АПГРЕЙДЫ</div>
        <div class="nav-item" onclick="openTab('inventory', this)">🎒 СКЛАД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        // 1. ПОЛУЧАЕМ ЮЗЕРА
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('user-nick').innerText = user.username ? `@${user.username}` : user.first_name;
            if(user.photo_url) {
                const img = document.getElementById('user-photo');
                img.src = user.photo_url; img.style.display = 'block';
            }
        }

        // 2. ПОЛУЧАЕМ БАЛАНС
        const urlParams = new URLSearchParams(window.location.search);
        let balance = parseInt(urlParams.get('balance')) || 0;
        document.getElementById('balance-val').innerText = `${balance} ★`;

        const items = [
            { name: "Ice Cream", img: "1.png" },
            { name: "Xmas Stocking", img: "2.png" },
            { name: "Snoop Cigar", img: "3.png" }
        ];

        let myInventory = [];
        const tape = document.getElementById('tape');
        let winItem = null;

        function fillTape() {
            tape.innerHTML = '';
            for(let i=0; i<100; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `<img src="${item.img}"><span>???</span>`;
                tape.appendChild(div);
            }
        }
        fillTape();

        function startSpin() {
            if(balance < 444) { tg.showAlert("Мало звезд!"); return; }
            balance -= 444;
            document.getElementById('balance-val').innerText = `${balance} ★`;
            tg.sendData(JSON.stringify({ action: "spin_pay" }));

            document.getElementById('spinBtn').style.display = 'none';
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";

            setTimeout(() => {
                const stopIdx = 70;
                winItem = items[Math.floor(Math.random() * items.length)];
                tape.children[stopIdx].innerHTML = `<img src="${winItem.img}"><span id="win-txt" style="opacity:0; color:#0f0;">${winItem.name}</span>`;

                tape.style.transition = "transform 7s cubic-bezier(0.15, 0, 0.15, 1)";
                const offset = -(stopIdx * 130) + (window.innerWidth / 2) - 65;
                tape.style.transform = `translateX(${offset}px)`;

                setTimeout(() => {
                    document.getElementById('win-txt').style.opacity = "1";
                    document.getElementById('choice-btns').style.display = 'flex';
                }, 7000);
            }, 50);
        }

        function handleChoice(type) {
            if(type === 'keep') {
                myInventory.push(winItem);
                updateInvUI();
                tg.sendData(JSON.stringify({ action: "save_only", item: winItem.name }));
            } else {
                balance += 200;
                tg.sendData(JSON.stringify({ action: "sell_only", item: winItem.name }));
            }
            document.getElementById('balance-val').innerText = `${balance} ★`;
            document.getElementById('choice-btns').style.display = 'none';
            document.getElementById('spinBtn').style.display = 'block';
            fillTape();
        }

        function updateInvUI() {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            myInventory.forEach(it => {
                grid.innerHTML += `<div class="inv-item"><img src="${it.img}"><br><span>${it.name}</span></div>`;
            });
        }

        function openTab(id, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active-tab');
        }
    </script>
</body>
</html>

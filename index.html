<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Lviss HUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding-top: 60px; overflow: hidden; }
        
        /* ШАПКА С БАЛАНСОМ */
        .header { position: fixed; top: 0; width: 100%; height: 50px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #0f0; box-sizing: border-box; z-index: 1000; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #0f0; background: #222; }
        .balance-top { color: #0f0; font-weight: bold; font-size: 14px; }

        .tab-content { display: none; padding: 10px; text-align: center; }
        .active { display: block; }
        
        /* РУЛЕТКА */
        .roulette-wrapper { position: relative; width: 100%; height: 160px; background: #111; border-top: 1px solid #333; border-bottom: 1px solid #333; overflow: hidden; margin-top: 20px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #ff0000; z-index: 100; box-shadow: 0 0 10px #ff0000; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 5s cubic-bezier(0.1, 0, 0, 1); }
        
        .item-card { min-width: 130px; height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #222; box-sizing: border-box; }
        .item-card img { width: 70px; height: 70px; object-fit: contain; }
        .item-card span { font-size: 11px; margin-top: 5px; color: #888; }

        /* КНОПКИ УПРАВЛЕНИЯ */
        .controls { margin-top: 30px; padding: 0 20px; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        .main-btn { width: 100%; max-width: 300px; height: 55px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .spin-btn { background: #0f0; color: #000; box-shadow: 0 0 15px rgba(0, 255, 0, 0.3); }
        .keep-btn { background: #222; color: #fff; border: 1px solid #444; }
        .sell-btn { background: #f00; color: #fff; }
        
        #choice-btns { display: none; width: 100%; max-width: 300px; gap: 10px; }
        #choice-btns button { flex: 1; }

        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; border-top: 1px solid #333; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #555; font-size: 12px; cursor: pointer; }
        .nav-item.active-tab { color: #0f0; border-top: 2px solid #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="user-info">
            <img src="" id="user-photo" class="avatar" onerror="this.src='https://i.imgur.com/8Qp7K0X.png'">
            <span id="user-name" style="font-size: 14px; font-weight: 500;">Misha</span>
        </div>
        <div class="balance-top" id="balance-val">0 ★</div>
    </div>

    <div id="cases" class="tab-content active">
        <h3 style="color: #0f0; margin-top: 30px;">3LVISS LUCKY CASE</h3>
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>

        <div class="controls">
            <button id="spinBtn" class="main-btn spin-btn" onclick="startSpin()">КРУТИТЬ ЗА 444 ★</button>
            
            <div id="choice-btns">
                <button class="main-btn keep-btn" onclick="handleChoice('keep')">ОСТАВИТЬ</button>
                <button class="main-btn sell-btn" onclick="handleChoice('sell')">ПРОДАТЬ ЗА 200 ★</button>
            </div>
        </div>
    </div>

    <div id="inventory" class="tab-content">
        <h3>🎒 СКЛАД</h3>
        <div id="inv-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-tab" onclick="openTab('cases', this)">КЕЙСЫ</div>
        <div class="nav-item" onclick="openTab('inventory', this)">СКЛАД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Подгружаем данные юзера
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user?.first_name || "User";
        if(tg.initDataUnsafe.user?.photo_url) document.getElementById('user-photo').src = tg.initDataUnsafe.user.photo_url;

        const urlParams = new URLSearchParams(window.location.search);
        let balance = parseInt(urlParams.get('balance')) || 0;
        document.getElementById('balance-val').innerText = `${balance} ★`;

        const items = [
            { name: "Ice Cream", img: "1.png", rarity: "common" },
            { name: "Xmas Stocking", img: "2.png", rarity: "rare" },
            { name: "Snoop Cigar", img: "3.png", rarity: "legendary" }
        ];

        const tape = document.getElementById('tape');
        const itemWidth = 130;
        let winItem = null;

        function fillTape() {
            tape.innerHTML = '';
            for(let i=0; i<100; i++) {
                const item = items[Math.floor(Math.random() * items.length)];
                const div = document.createElement('div');
                div.className = 'item-card';
                div.innerHTML = `<img src="${item.img}"><span>${item.name}</span>`;
                tape.appendChild(div);
            }
        }
        fillTape();

        function startSpin() {
            if(balance < 444) {
                tg.showAlert("Недостаточно звезд!");
                return;
            }

            const spinBtn = document.getElementById('spinBtn');
            const choiceBtns = document.getElementById('choice-btns');
            
            spinBtn.style.display = 'none';
            choiceBtns.style.display = 'none';

            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";

            setTimeout(() => {
                const stopIndex = 70 + Math.floor(Math.random() * 5);
                winItem = items[Math.floor(Math.random() * items.length)];
                
                // ТОЧНАЯ ПОДМЕНА: ставим выигрышный предмет ровно в stopIndex
                const winDiv = tape.children[stopIndex];
                winDiv.innerHTML = `<img src="${winItem.img}"><span style="color:#0f0">${winItem.name}</span>`;

                tape.style.transition = "transform 5s cubic-bezier(0.1, 0, 0, 1)";
                // Центрируем предмет по красной линии
                const offset = -(stopIndex * itemWidth) + (window.innerWidth / 2) - (itemWidth / 2);
                tape.style.transform = `translateX(${offset}px)`;

                setTimeout(() => {
                    choiceBtns.style.display = 'flex';
                }, 5500);
            }, 50);
        }

        function handleChoice(type) {
            if(type === 'keep') {
                tg.sendData(JSON.stringify({ action: "save_item", item: winItem.name }));
            } else {
                tg.sendData(JSON.stringify({ action: "sell_instant", item: winItem.name }));
                balance += 200;
            }
            balance -= 444;
            document.getElementById('balance-val').innerText = `${balance} ★`;
            
            document.getElementById('choice-btns').style.display = 'none';
            document.getElementById('spinBtn').style.display = 'block';
            fillTape();
        }

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-top: 60px; overflow: hidden; -webkit-user-select: none; }
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #0f0; z-index: 1000; box-sizing: border-box; }
        .balance-top { color: #0f0; font-weight: bold; font-size: 18px; }
        
        /* MRKT STYLE TOAST */
        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); width: 90%; background: #1a1a1a; border: 1px solid #0f0; border-radius: 12px; padding: 12px; display: flex; align-items: center; gap: 10px; z-index: 3000; transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #toast.show { bottom: 80px; }

        .tab-content { display: none; text-align: center; height: calc(100vh - 120px); overflow-y: auto; }
        .active { display: block; }

        /* КЕЙСЫ */
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .case-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 20px; cursor: pointer; }
        .case-card b { font-size: 18px; }

        /* РУЛЕТКА */
        .roulette-wrapper { position: relative; width: 100%; height: 160px; background: #0a0a0a; border: 1px solid #222; overflow: hidden; margin-top: 20px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #f00; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .item-card { min-width: 130px; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; }
        .item-card img { width: 70px; height: 70px; }

        .btn { width: 90%; height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-main { background: #0f0; color: #000; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-weight: bold; }
        .nav-item.active-tab { color: #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <div id="user-n">@user</div>
        <div class="balance-top" id="bal">0 ★</div>
    </div>

    <div id="toast">
        <div style="background:#0f0; width:35px; height:35px; border-radius:50%; color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold;">★</div>
        <div>
            <div style="font-size:10px; color:#aaa;">ПОПОЛНЕНИЕ</div>
            <div id="toast-amt" style="font-weight:bold;">+0 ★</div>
        </div>
    </div>

    <div id="shop" class="tab-content active">
        <div class="case-grid">
            <div class="case-card" onclick="openCase(222, 'Lite')"><b>Lite</b><br><span style="color:#0f0">222 ★</span></div>
            <div class="case-card" onclick="openCase(444, 'Lucky')"><b>Lucky</b><br><span style="color:#0f0">444 ★</span></div>
            <div class="case-card" onclick="openCase(888, 'Elite')"><b>Elite</b><br><span style="color:#0f0">888 ★</span></div>
        </div>
    </div>

    <div id="game" class="tab-content">
        <h2 id="g-title">Кейс</h2>
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button id="spinBtn" class="btn btn-main" onclick="startSpin()">ОТКРЫТЬ</button>
        <div id="post-game" style="display:none; gap:10px; padding:20px;">
            <button class="btn" style="background:#333; color:#fff;" onclick="toTab('shop')">НА СКЛАД</button>
            <button class="btn" style="background:#f00; color:#fff;" onclick="toTab('shop')">ПРОДАТЬ</button>
        </div>
    </div>

    <div id="inv" class="tab-content">
        <h3 style="margin-top:40px;">Ваш склад пуст</h3>
    </div>

    <div class="nav">
        <div class="nav-item active-tab" id="n-shop" onclick="toTab('shop')">КЕЙСЫ</div>
        <div class="nav-item" id="n-inv" onclick="toTab('inv')">СКЛАД</div>
    </div>

    <script>
        const API_URL = "https://king-legibly-mouse.ngrok-free.dev"; // ТВОЯ ССЫЛКА ИЗ NGROK
        const tg = window.Telegram.WebApp;
        const uid = new URLSearchParams(window.location.search).get('uid');
        let balance = 0, lastGId = 0, isSpinning = false;

        // РЕАЛЬНОЕ ВРЕМЯ (ПОЛЛИНГ)
        async function checkUpdates() {
            if(!uid || isSpinning) return;
            try {
                const r = await fetch(`${API_URL}/get_balance?uid=${uid}`);
                const d = await r.json();
                if(d.balance !== undefined) {
                    balance = d.balance;
                    document.getElementById('bal').innerText = balance + " ★";
                    if(d.g_id > lastGId) {
                        if(lastGId !== 0) showToast(d.g_amt);
                        lastGId = d.g_id;
                    }
                }
            } catch(e) {}
        }
        setInterval(checkUpdates, 3000);

        function showToast(amt) {
            const t = document.getElementById('toast');
            document.getElementById('toast-amt').innerText = `+${amt} ★`;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        // КЕЙСЫ
        const items = [
            { name: "Premium", img: "1.png" },
            { name: "TON Coin", img: "2.png" }, //
            { name: "Snoop Cigar", img: "3.png" }
        ];

        function openCase(p, t) {
            document.getElementById('g-title').innerText = t;
            const tape = document.getElementById('tape');
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            tape.innerHTML = "";
            for(let i=0; i<80; i++) {
                const it = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="item-card"><img src="${it.img}"></div>`;
            }
            toTab('game');
            document.getElementById('spinBtn').style.display = 'block';
            document.getElementById('post-game').style.display = 'none';
        }

        function startSpin() {
            if(isSpinning) return;
            isSpinning = true;
            const tape = document.getElementById('tape');
            const winIdx = 60;
            const offset = -(winIdx * 130) + (window.innerWidth / 2 - 65);
            tape.style.transition = "transform 5s cubic-bezier(0.15, 0, 0.15, 1)";
            tape.style.transform = `translateX(${offset}px)`;
            
            setTimeout(() => {
                isSpinning = false;
                document.getElementById('spinBtn').style.display = 'none';
                document.getElementById('post-game').style.display = 'flex';
            }, 5500);
        }

        function toTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + (id === 'game' ? 'shop' : id)).classList.add('active-tab');
        }

        document.getElementById('user-n').innerText = tg.initDataUnsafe?.user?.username || "Player";
        tg.expand();
    </script>
</body>
</html>

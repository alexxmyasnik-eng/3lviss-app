<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-top: 60px; overflow: hidden; }
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #0f0; z-index: 1000; box-sizing: border-box; }
        .balance-top { color: #0f0; font-weight: bold; }
        .tab-content { display: none; text-align: center; padding: 10px; }
        .active { display: block; }
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .case-card { background: #111; border: 1px solid #333; border-radius: 15px; padding: 15px; cursor: pointer; }
        .roulette-wrapper { position: relative; width: 100%; height: 160px; background: #0a0a0a; border: 1px solid #222; overflow: hidden; margin-top: 10px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #f00; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; transition: transform 6s cubic-bezier(0.1, 0, 0.1, 1); }
        .item-card { min-width: 130px; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; box-sizing: border-box; }
        .item-card img { width: 70px; height: 70px; }
        .main-btn { width: 100%; height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: #0f0; color: #000; margin-top: 20px; }
        .choice-group { display: none; gap: 10px; margin-top: 20px; }
        .choice-btn { flex: 1; height: 50px; border-radius: 12px; border: none; color: #fff; font-weight: bold; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 12px; }
        .nav-item.active-tab { color: #0f0; }
    </style>
</head>
<body>

    <div class="header">
        <span id="user-nick">@User</span>
        <div class="balance-top" id="balance-val">0 ★</div>
    </div>

    <div id="shop" class="tab-content active">
        <div class="case-grid">
            <div class="case-card" onclick="openCase(222)">Lite<br><span style="color:#0f0">222 ★</span></div>
            <div class="case-card" onclick="openCase(444)">Lucky<br><span style="color:#0f0">444 ★</span></div>
        </div>
    </div>

    <div id="roulette-screen" class="tab-content">
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div id="tape" class="tape"></div>
        </div>
        <button id="spinBtn" class="main-btn" onclick="startSpin()">КРУТИТЬ</button>
        <div id="choice-btns" class="choice-group">
            <button class="choice-btn" style="background:#333" onclick="handleChoice('keep')">ОСТАВИТЬ</button>
            <button class="choice-btn" style="background:#f00" onclick="handleChoice('sell')">ПРОДАТЬ</button>
        </div>
    </div>

    <div id="inventory" class="tab-content">
        <div id="inv-list"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active-tab" onclick="openTab('shop')">КЕЙСЫ</div>
        <div class="nav-item" onclick="openTab('inventory')">СКЛАД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let balance = parseInt(new URLSearchParams(window.location.search).get('balance')) || 0;
        document.getElementById('balance-val').innerText = balance + " ★";

        const items = [
            { name: "Ice Cream", img: "1.png" },
            { name: "Gift Box", img: "2.png" },
            { name: "Snoop Cigar", img: "3.png" }
        ];

        let currentPrice = 0;
        let isSpinning = false;
        let winItem = null;

        function openCase(p) {
            currentPrice = p;
            openTab('roulette-screen');
            const tape = document.getElementById('tape');
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            tape.innerHTML = '';
            for(let i=0; i<70; i++) {
                const it = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="item-card"><img src="${it.img}"></div>`;
            }
            document.getElementById('spinBtn').style.display = 'block';
            document.getElementById('choice-btns').style.display = 'none';
        }

        function startSpin() {
            if (balance < currentPrice || isSpinning) return;
            isSpinning = true;
            balance -= currentPrice;
            document.getElementById('balance-val').innerText = balance + " ★";
            
            // Сигнал боту
            tg.sendData(JSON.stringify({action: "spin", price: currentPrice}));

            const tape = document.getElementById('tape');
            const stopIdx = 55;
            winItem = items[Math.floor(Math.random()*items.length)];
            
            // Ставим победный предмет
            tape.children[stopIdx].innerHTML = `<img src="${winItem.img}">`;

            document.getElementById('spinBtn').style.display = 'none';
            
            setTimeout(() => {
                tape.style.transition = "transform 6s cubic-bezier(0.1, 0, 0.1, 1)";
                const screenWidth = window.innerWidth;
                const offset = -(stopIdx * 130) + (screenWidth / 2) - 65;
                tape.style.transform = `translateX(${offset}px)`;
            }, 50);

            setTimeout(() => {
                document.getElementById('choice-btns').style.display = 'flex';
                isSpinning = false;
            }, 6500);
        }

        function handleChoice(type) {
            if(type === 'keep') {
                tg.sendData(JSON.stringify({action: "save", item: winItem.name}));
            } else {
                let sellP = Math.floor(currentPrice * 0.5);
                balance += sellP;
                document.getElementById('balance-val').innerText = balance + " ★";
                tg.sendData(JSON.stringify({action: "sell", price: sellP}));
            }
            openTab('shop');
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>

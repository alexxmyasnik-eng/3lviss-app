<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3Lviss Lucky Rocket</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; padding-top: 60px; overflow: hidden; -webkit-user-select: none; }
        .header { position: fixed; top: 0; width: 100%; height: 55px; background: #111; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #0f0; z-index: 1000; box-sizing: border-box; }
        .balance-top { color: #0f0; font-weight: bold; font-size: 18px; }
        .tab-content { display: none; text-align: center; padding: 10px; height: calc(100vh - 120px); overflow-y: auto; }
        .active { display: block; }
        .case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .case-card { background: #111; border: 1px solid #333; border-radius: 12px; padding: 12px; cursor: pointer; }
        .roulette-wrapper { position: relative; width: 100%; height: 160px; background: #0a0a0a; border: 1px solid #222; overflow: hidden; margin-top: 10px; }
        .pointer { position: absolute; left: 50%; top: 0; width: 2px; height: 100%; background: #f00; z-index: 10; transform: translateX(-50%); }
        .tape { display: flex; position: absolute; left: 0; top: 0; height: 100%; }
        .item-card { min-width: 130px; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #1a1a1a; }
        .item-card img { width: 70px; height: 70px; }
        .main-btn { width: 100%; height: 50px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; background: #0f0; color: #000; margin-top: 15px; }
        .choice-group { display: none; gap: 10px; margin-top: 15px; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; height: 60px; background: #111; display: flex; border-top: 1px solid #222; }
        .nav-item { flex: 1; display: flex; align-items: center; justify-content: center; color: #444; font-size: 12px; font-weight: bold; }
        .nav-item.active-tab { color: #0f0; }
        .inv-item { background: #111; border: 1px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header">
        <span id="user-n">@User</span>
        <div class="balance-top" id="balance-val">0 ★</div>
    </div>

    <div id="shop" class="tab-content active">
        <div class="case-grid">
            <div class="case-card" onclick="openCase(222)">Lite<br><span style="color:#0f0">222 ★</span></div>
            <div class="case-card" onclick="openCase(444)">Lucky<br><span style="color:#0f0">444 ★</span></div>
            <div class="case-card" onclick="openCase(888)">Elite<br><span style="color:#0f0">888 ★</span></div>
        </div>
    </div>

    <div id="roulette-screen" class="tab-content">
        <div class="roulette-wrapper"><div class="pointer"></div><div id="tape" class="tape"></div></div>
        <button id="spinBtn" class="main-btn" onclick="startSpin()">КРУТИТЬ</button>
        <div id="choice-btns" class="choice-group">
            <button style="flex:1; background:#333; color:#fff; border-radius:12px; height:50px; border:none;" onclick="handleChoice('keep')">ОСТАВИТЬ</button>
            <button style="flex:1; background:#f00; color:#fff; border-radius:12px; height:50px; border:none;" onclick="handleChoice('sell')">ПРОДАТЬ</button>
        </div>
    </div>

    <div id="inventory" class="tab-content"><div id="inv-list"></div></div>

    <div class="nav-bar">
        <div class="nav-item active-tab" id="n-shop" onclick="openTab('shop')">КЕЙСЫ</div>
        <div class="nav-item" id="n-inv" onclick="openTab('inventory')">СКЛАД</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let urlParams = new URLSearchParams(window.location.search);
        // Приоритет всегда тому, что передал бот в ссылке!
        let balance = parseInt(urlParams.get('bal')) || parseInt(localStorage.getItem('user_balance')) || 0;

        function updateBal() {
            document.getElementById('balance-val').innerText = balance + " ★";
            localStorage.setItem('user_balance', balance);
        }
        updateBal();

        const items = [
            { name: "Ice Cream", img: "1.png" },
            { name: "Gift Box", img: "2.png" },
            { name: "Snoop Cigar", img: "3.png" }
        ];

        let myInv = JSON.parse(localStorage.getItem('myInv')) || [];
        let currentPrice = 0, isSpinning = false, winItem = null;

        function openCase(p) {
            if(isSpinning) return;
            currentPrice = p;
            openTab('roulette-screen');
            const tape = document.getElementById('tape');
            tape.style.transition = "none";
            tape.style.transform = "translateX(0)";
            tape.innerHTML = '';
            for(let i=0; i<80; i++) {
                const it = items[Math.floor(Math.random()*items.length)];
                tape.innerHTML += `<div class="item-card"><img src="${it.img}"></div>`;
            }
            document.getElementById('spinBtn').style.display = 'block';
            document.getElementById('choice-btns').style.display = 'none';
        }

        function startSpin() {
            if (balance < currentPrice || isSpinning) {
                if(balance < currentPrice) tg.showAlert("Недостаточно звезд!");
                return;
            }
            isSpinning = true;
            balance -= currentPrice;
            updateBal();
            
            // СРАЗУ отправляем боту инфу, что звезды потрачены
            tg.sendData(JSON.stringify({action: "spin", price: currentPrice}));

            const stopIdx = 60;
            winItem = {...items[Math.floor(Math.random()*items.length)]};
            
            const tape = document.getElementById('tape');
            tape.children[stopIdx].innerHTML = `<img src="${winItem.img}"><br><b>${winItem.name}</b>`;
            document.getElementById('spinBtn').style.display = 'none';
            
            setTimeout(() => {
                tape.style.transition = "transform 6s cubic-bezier(0.15, 0, 0.15, 1)";
                const offset = -(stopIdx * 130) + (window.innerWidth / 2) - 65;
                tape.style.transform = `translateX(${offset}px)`;
            }, 50);

            setTimeout(() => {
                document.getElementById('choice-btns').style.display = 'flex';
                isSpinning = false;
            }, 6500);
        }

        function handleChoice(type) {
            if(type === 'sell') {
                let sellPrice = Math.floor(currentPrice * 0.5);
                balance += sellPrice;
                updateBal();
                tg.sendData(JSON.stringify({action: "sell", price: sellPrice}));
            } else {
                myInv.push(winItem);
                localStorage.setItem('myInv', JSON.stringify(myInv));
            }
            openTab('shop');
        }

        function renderInv() {
            const list = document.getElementById('inv-list');
            list.innerHTML = myInv.length ? '' : '<p style="color:#444;">Пусто</p>';
            myInv.forEach((it, idx) => {
                list.innerHTML += `
                <div class="inv-item">
                    <span>${it.name}</span>
                    <button onclick="sendWithdraw(${idx})" style="background:#007bff; color:#fff; border:none; padding:5px 10px; border-radius:5px;">ВЫВОД</button>
                </div>`;
            });
        }

        function sendWithdraw(idx) {
            tg.sendData(JSON.stringify({action: "withdraw", item: myInv[idx].name}));
            myInv.splice(idx, 1);
            localStorage.setItem('myInv', JSON.stringify(myInv));
            renderInv();
            tg.showAlert("Заявка отправлена!");
        }

        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'inventory') renderInv();
        }
    </script>
</body>
</html>
